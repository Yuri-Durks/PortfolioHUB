<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>To-Do List</title>

<style>

body{
    background:#0f172a;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    color:white;
}

.container{
    background:#1e293b;
    padding:30px;
    border-radius:20px;
    width:350px;
}

input{
    width:70%;
    padding:10px;
    border:none;
    border-radius:10px;
}

button{
    padding:10px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

li{
    margin-top:10px;
}

</style>
</head>

<body>

<div class="container">

<h1>Lista de Tarefas</h1>
    <p style="font-size:16px; color:#cbd5e1;">
    Organize suas tarefas diárias de forma simples e prática.
</p>

<p style="font-size:14px; color:gray;">
    Nenhuma tarefa adicionada no momento.
</p>

<input type="text" id="tarefa" placeholder="Digite uma tarefa">
<button onclick="adicionar()">Adicionar</button>

<ul id="lista"></ul>

</div>

<script>

function adicionar(){

    let tarefa = document.getElementById("tarefa").value;

    if(tarefa === ""){
        return;
    }

    let li = document.createElement("li");

    li.innerText = tarefa;

    document.getElementById("lista").appendChild(li);

    document.getElementById("tarefa").value = "";
}

</script>

</body>
</html>
