<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora</title>

<style>

body{
    background:#0f172a;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:Arial;
}

.calculadora{
    background:#1e293b;
    padding:30px;
    border-radius:20px;
    width:300px;
}

input{
    width:100%;
    height:50px;
    margin-bottom:20px;
    font-size:22px;
    text-align:right;
}

button{
    width:65px;
    height:65px;
    margin:2px;
    font-size:20px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

</style>
</head>

<body>

<div class="calculadora">

<input type="text" id="resultado" readonly>

<div>
<button onclick="adicionar('7')">7</button>
<button onclick="adicionar('8')">8</button>
<button onclick="adicionar('9')">9</button>
<button onclick="adicionar('/')">/</button>
</div>

<div>
<button onclick="adicionar('4')">4</button>
<button onclick="adicionar('5')">5</button>
<button onclick="adicionar('6')">6</button>
<button onclick="adicionar('*')">*</button>
</div>

<div>
<button onclick="adicionar('1')">1</button>
<button onclick="adicionar('2')">2</button>
<button onclick="adicionar('3')">3</button>
<button onclick="adicionar('-')">-</button>
</div>

<div>
<button onclick="adicionar('0')">0</button>
<button onclick="limpar()">C</button>
<button onclick="calcular()">=</button>
<button onclick="adicionar('+')">+</button>
</div>

</div>

<script>

function adicionar(valor){
    document.getElementById("resultado").value += valor;
}

function limpar(){
    document.getElementById("resultado").value = "";
}

function calcular(){
    let resultado = document.getElementById("resultado").value;
    document.getElementById("resultado").value = eval(resultado);
}

</script>

</body>
</html>
