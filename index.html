<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gerenciador de Tarefas</title>

<style>

body{
    background:#0f172a;
    font-family:Arial;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

.container{
    background:#1e293b;
    padding:30px;
    border-radius:20px;
    width:320px;
    text-align:center;
}

h1{
    color:#38bdf8;
}

p{
    color:#cbd5e1;
}

input{
    width:90%;
    padding:10px;
    margin-top:15px;
    border:none;
    border-radius:10px;
}

button{
    margin-top:15px;
    padding:10px 20px;
    border:none;
    border-radius:10px;
    background:#38bdf8;
    color:white;
    cursor:pointer;
}

ul{
    margin-top:20px;
    padding:0;
    list-style:none;
}

li{
    background:#334155;
    margin-top:10px;
    padding:10px;
    border-radius:10px;
}

</style>
</head>

<body>

<div class="container">

    <h1>Gerenciador de Tarefas</h1>

    <p>
        Organize suas tarefas diárias.
    </p>

    <input type="text" id="tarefa" placeholder="Digite uma tarefa">

    <br>

    <button onclick="adicionar()">
        Adicionar
    </button>

    <ul id="lista"></ul>

</div>

<script>

function adicionar(){

    let tarefa = document.getElementById("tarefa").value;

    if(tarefa == ""){
        return;
    }

    let item = document.createElement("li");

    item.innerText = tarefa;

    document.getElementById("lista").appendChild(item);

    document.getElementById("tarefa").value = "";

}

</script>

</body>

</html>
