<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PortfolioHUB</title>

    <style>

        body{
            margin:0;
            padding:0;
            background:#0f172a;
            color:white;
            font-family:Arial;
            text-align:center;
        }

        header{
            padding:60px;
        }

        h1{
            font-size:50px;
            color:#38bdf8;
        }

        p{
            font-size:20px;
            color:#cbd5e1;
        }

        .container{
            display:flex;
            justify-content:center;
            flex-wrap:wrap;
            gap:20px;
            padding:20px;
        }

        .card{
            background:#1e293b;
            padding:20px;
            width:300px;
            border-radius:15px;
        }

        a{
            color:#38bdf8;
            text-decoration:none;
            font-weight:bold;
        }

        footer{
            margin-top:50px;
            padding:20px;
            color:gray;
        }

    </style>
</head>

<body>

    <header>
        <h1>PortfolioHUB</h1>

        <p>
            Repositório acadêmico e profissional utilizando GitHub Pages
        </p>
    </header>

    <div class="container">

        <div class="card">

            <h2>Calculadora</h2>

            <p>
                Mini projeto utilizando HTML, CSS e JavaScript.
            </p>

            <a href="projetos-academicos/calculadora/">
                Abrir Projeto
            </a>

        </div>

        <div class="card">

            <h2>Lista de Tarefas</h2>

            <p>
                Projeto desenvolvido com HTML, CSS e JavaScript.
            </p>

            <a href="projetos-pessoais/todolist/">
                Abrir Projeto
            </a>

        </div>

    </div>

    <footer>
        Desenvolvido para atividade acadêmica
    </footer>

</body>

</html>
